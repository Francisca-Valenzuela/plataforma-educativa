# =============================================
# PERFIL ACTIVO
# (Cambia a "oracle" cuando quieras probar con la nube)
# =============================================
spring.profiles.active=local

# =============================================
# CONFIGURACIÓN GENERAL (Puerto y Monitoreo)
# =============================================
server.port=8080
management.endpoints.web.exposure.include=health,info

# =============================================
# CONFIGURACIÓN RABBITMQ (Semana 7)
# =============================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# =============================================
# CONFIGURACIÓN AWS S3
# =============================================
aws.s3.bucket-name=bucket-exp1-s2
aws.region=${AWS_REGION:us-east-1}
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.stack.auto=false

# =============================================
# SEMANA 4: Azure AD B2C - Validación JWT
# =============================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/TU_DIRECTORY_ID/v2.0

spring.main.allow-bean-definition-overriding=true
spring.h2.console.settings.web-allow-others=true