name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # Paso 2: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen de plataforma-educativa (raíz del repo)
      - name: Build plataforma-educativa image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educativa:latest .

      # Paso 4: Construir la imagen del BFF (bff-inscripciones)
      - name: Build bff-inscripciones image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bff-inscripciones:latest ./bff-inscripciones

      # Paso 5: Push de ambas imágenes a DockerHub
      - name: Push images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educativa:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bff-inscripciones:latest

      # Paso 6: Configurar credenciales AWS (requerido para la sesión temporal de AWS Academy)
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 7: Agregar la llave SSH privada para conectarse a EC2
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 8: Conectarse a EC2 via SSH y desplegar los tres contenedores
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Autenticar en DockerHub desde EC2
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login \
              -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Descargar las últimas versiones de ambas imágenes
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educativa:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bff-inscripciones:latest

            # --- RabbitMQ ---
            docker start rabbitmq-plataforma-educativa 2>/dev/null || docker run -d \
              --name rabbitmq-plataforma-educativa \
              --network host \
              -e RABBITMQ_DEFAULT_USER=guest \
              -e RABBITMQ_DEFAULT_PASS=guest \
              --restart unless-stopped \
              rabbitmq:3-management

            # --- plataforma-educativa ---
            docker stop plataforma-educativa || true
            docker rm   plataforma-educativa || true
            docker run -d \
              --name plataforma-educativa \
              --network host \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI="${{ secrets.AZURE_ISSUER_URI }}" \
              -e AWS_REGION="us-east-1" \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educativa:latest

            # --- bff-inscripciones ---
            docker stop bff-inscripciones || true
            docker rm   bff-inscripciones || true
            docker run -d \
              --name bff-inscripciones \
              --network host \
              -e SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI="${{ secrets.AZURE_ISSUER_URI }}" \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/bff-inscripciones:latest
          EOF